spring:
  application:
    name: sme

  datasource:
    url: jdbc:postgresql://pg-23b34967-sihlentshangase06-6d21.b.aivencloud.com:12667/smetech?sslmode=require
    username: {DB_NAME}
    password: {DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-timeout: 30000
      maximum-pool-size: 5
      connection-test-query: SELECT 1

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  mail:
    host: smtp.gmail.com
    port: 587
    username: {APP_EMAIL}
    password: {APP_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true

  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=10000,expireAfterWrite=60m

  async:
    executor:
      core-pool-size: 2
      max-pool-size: 5
      queue-capacity: 100

app:
  base-url: http://localhost:8080
  domain: localhost:8080

  jwt:
    secret: ${JWT_SECRET}
    access-token-expiry-minutes: 15

  verification-token:
    ttl-hours: 24

  rate-limit:
    ip-max-attempts: 5
    email-max-attempts: 3
    window-minutes: 60
    block-duration-minutes: 60

  slug:
    max-retries: 5
    min-length: 3
    max-length: 50
    reserved-keywords: admin,api,app,auth,dashboard,login,logout,register,signup,store,support,www,mail,static,assets,public,private,internal,system,root

  bcrypt:
    strength: 12

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha
    try-it-out-enabled: true

---
spring:
  config:
    activate:
      on-profile: test

  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

  mail:
    host: localhost
    port: 3025
    username: test
    password: test
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

app:
  slug:
    reserved-keywords: admin,api,app,auth,store
