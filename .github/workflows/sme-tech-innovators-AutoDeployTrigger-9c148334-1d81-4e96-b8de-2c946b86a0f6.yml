name: Trigger auto deployment for sme-tech-innovators

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ main ]
    paths:
    - '**'
    - '.github/workflows/sme-tech-innovators-AutoDeployTrigger-9c148334-1d81-4e96-b8de-2c946b86a0f6.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.SMETECHINNOVATORS_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.SMETECHINNOVATORS_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.SMETECHINNOVATORS_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          _dockerfilePathKey_: _dockerfilePath_
          _targetLabelKey_: _targetLabel_
          registryUrl: docker.io
          registryUsername: ${{ secrets.SMETECHINNOVATORS_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.SMETECHINNOVATORS_REGISTRY_PASSWORD }}
          containerAppName: sme-tech-innovators
          resourceGroup: sme_tech
          imageToBuild: tech06/sme-tech-innovators:${{ github.sha }}
          _buildArgumentsKey_: |
            _buildArgumentsValues_


